server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico)$ {
        add_header Cache-Control "public, max-age=300";
    }
}
